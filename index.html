<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWC-Bet | Torneio de Sinuca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased pb-20">

    <!-- MODAL DE DEPÓSITO -->
    <div id="modal-pix" class="hidden fixed inset-0 bg-black bg-opacity-80 z-[100] flex items-center justify-center p-4">
        <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl w-full max-w-sm text-center relative">
            <button onclick="fecharPix()" class="absolute top-3 right-4 text-gray-400 hover:text-white font-bold text-xl">&times;</button>
            <h2 class="text-xl font-bold text-yellow-400 mb-2">📥 Comprar Fichas</h2>
            
            <div class="bg-gray-900 p-3 rounded-lg border border-gray-600 mb-2 flex flex-col gap-2">
                <span class="text-[10px] text-gray-400 uppercase font-bold">Chave PIX (E-mail)</span>
                <div class="flex items-center justify-between">
                    <code id="chave-pix" class="text-green-400 font-mono text-sm break-all">245561f2-8127-47b3-96cb-c819b94fd4e5</code>
                    <button onclick="copiarPix()" class="ml-2 bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded text-xs font-bold text-white border border-gray-500">Copiar</button>
                </div>
            </div>
            
            <p class="text-xs text-yellow-400 font-black mb-4">Cotação: R$ 1,00 = 100 Fichas</p>

            <div class="border-t border-gray-700 pt-4 text-left">
                <label class="text-xs text-gray-400 block mb-1">Qual valor em Reais você enviou?</label>
                <input type="number" id="valor-deposito-reais" placeholder="Ex: 50" class="w-full p-3 mb-2 bg-gray-900 border border-gray-600 rounded text-white outline-none" oninput="calcularFichasDeposito()">
                
                <p class="text-xs text-gray-300 mb-4">Fichas a receber: <span id="fichas-a-receber" class="font-black text-green-400 text-lg">0</span></p>
                
                <button onclick="solicitarDeposito()" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-lg font-bold transition">Confirmar Pagamento</button>
            </div>
        </div>
    </div>

    <!-- TELA DE LOGIN REDESENHADA -->
    <div id="tela-login" class="min-h-screen flex flex-col items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-800 via-gray-900 to-black">
        <div class="bg-gray-800/60 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-gray-700/50 relative text-center">
            
            <div class="mb-8">
                <h2 class="text-4xl font-black text-green-400 tracking-[0.2em] drop-shadow-lg uppercase">SWC-Bet</h2>
                <p class="text-gray-400 text-xs tracking-widest mt-2 uppercase font-bold">Banca de Sinuca</p>
            </div>
            
            <!-- BOTÕES INICIAIS -->
            <div id="botoes-iniciais" class="flex flex-col gap-4">
                <button onclick="mostrarFormLogin()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-xl font-black uppercase tracking-wider border border-gray-600 transition shadow-lg text-white">Já tenho conta</button>
                <button onclick="mostrarFormCadastro()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-black uppercase tracking-wider transition shadow-lg text-gray-900">Criar Nova Conta</button>
            </div>

            <!-- FORMULÁRIO DE LOGIN -->
            <div id="form-login" class="hidden flex flex-col">
                <button onclick="voltarInicio()" class="text-gray-400 text-xs mb-6 text-left hover:text-white uppercase font-bold tracking-wider">← Voltar</button>
                <input type="email" id="email-login" placeholder="E-mail" class="w-full p-4 mb-4 bg-gray-900/80 border border-gray-600 rounded-xl text-white outline-none focus:border-green-500 transition">
                <input type="password" id="senha-login" placeholder="Senha" class="w-full p-4 mb-6 bg-gray-900/80 border border-gray-600 rounded-xl text-white outline-none focus:border-green-500 transition">
                <button onclick="fazerLogin()" class="w-full bg-gray-700 hover:bg-gray-600 py-4 rounded-xl font-black uppercase tracking-wider border border-gray-600 transition shadow-lg text-white">Entrar na Banca</button>
            </div>

            <!-- FORMULÁRIO DE CADASTRO -->
            <div id="form-cadastro" class="hidden flex flex-col">
                <button onclick="voltarInicio()" class="text-gray-400 text-xs mb-6 text-left hover:text-white uppercase font-bold tracking-wider">← Voltar</button>
                <input type="text" id="nome-cad" placeholder="Nome Completo" class="w-full p-4 mb-4 bg-gray-900/80 border border-gray-600 rounded-xl text-white outline-none focus:border-green-500 transition">
                <input type="email" id="email-cad" placeholder="E-mail" class="w-full p-4 mb-4 bg-gray-900/80 border border-gray-600 rounded-xl text-white outline-none focus:border-green-500 transition">
                <input type="password" id="senha-cad" placeholder="Crie uma Senha" class="w-full p-4 mb-6 bg-gray-900/80 border border-gray-600 rounded-xl text-white outline-none focus:border-green-500 transition">
                <button onclick="criarConta()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-xl font-black uppercase tracking-wider transition shadow-lg text-gray-900">Finalizar Cadastro</button>
            </div>

        </div>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="tela-principal" class="hidden">
        <header class="bg-gray-800 p-4 shadow-md sticky top-0 z-50 flex justify-between items-center border-b border-gray-700">
            <h1 class="text-xl font-bold text-green-400">🎱 SWC-Bet</h1>
            <div class="text-right flex flex-col items-end">
                <!-- NOME E BOTÃO DE EDITAR -->
                <div class="flex items-center gap-2 mb-1">
                    <p id="nome-user" class="text-[10px] text-gray-400 font-bold uppercase"></p>
                    <button onclick="editarNomeUsuario()" class="text-gray-500 hover:text-white text-[9px] bg-gray-900 px-1.5 py-0.5 rounded border border-gray-700 transition" title="Editar Nome">✏️ Editar</button>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="mostrarPix()" class="text-[10px] bg-yellow-600 hover:bg-yellow-500 px-2 py-1 rounded text-white font-bold shadow-sm transition">📥 Depositar</button>
                    <button onclick="pedirSaque()" class="text-[10px] bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-white shadow-sm border border-gray-500 transition">💸 Sacar</button>
                    <p class="text-yellow-400 font-bold text-lg ml-1"><span id="saldo-user">0</span></p>
                </div>
            </div>
        </header>

        <nav class="flex overflow-x-auto bg-gray-800 p-2 gap-2 shadow-md hide-scroll" id="menu-tabs">
            <button onclick="mudarFase('Grupos')" class="flex-1 min-w-[70px] bg-gray-700 py-2 rounded-md font-bold text-xs transition tab-btn">Grupos</button>
            <button onclick="mudarFase('Oitavas')" class="flex-1 min-w-[70px] bg-green-600 py-2 rounded-md font-bold text-xs transition tab-btn">Oitavas</button>
            <button onclick="mudarFase('Quartas')" class="flex-1 min-w-[70px] bg-gray-700 py-2 rounded-md font-bold text-xs transition tab-btn">Quartas</button>
            <button onclick="mudarFase('Semi')" class="flex-1 min-w-[70px] bg-gray-700 py-2 rounded-md font-bold text-xs transition tab-btn">Semi</button>
            <button onclick="mudarFase('Final')" class="flex-1 min-w-[70px] bg-gray-700 py-2 rounded-md font-bold text-xs transition tab-btn">Final</button>
            <button onclick="mostrarHistorico()" class="flex-1 min-w-[70px] bg-blue-600 py-2 rounded-md font-bold text-xs transition tab-btn" id="btn-historico">Histórico</button>
        </nav>

        <main id="container-principal" class="p-4 max-w-md mx-auto"></main>
    </div>

    <style>.hide-scroll::-webkit-scrollbar { display: none; } .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }</style>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC2GLJVb-sNki-yG-GcJib2EZlp4lWPynQ", authDomain: "swc-bet.firebaseapp.com",
            projectId: "swc-bet", storageBucket: "swc-bet.firebasestorage.app",
            messagingSenderId: "701279276247", appId: "1:701279276247:web:5d7b851b300c1056d67492", measurementId: "G-N16WDY7WQC"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // MARGEM DA BANCA
        const OVERROUND = 1.15; 
        
        let faseAtual = 'Oitavas', dadosUsuario = null, unsubscribePartidas = null, unsubscribeHistorico = null;

        // ================= FUNÇÕES DE TELA (LOGIN) =================
        function mostrarFormLogin() {
            document.getElementById('botoes-iniciais').classList.add('hidden');
            document.getElementById('form-login').classList.remove('hidden');
        }

        function mostrarFormCadastro() {
            document.getElementById('botoes-iniciais').classList.add('hidden');
            document.getElementById('form-cadastro').classList.remove('hidden');
        }

        function voltarInicio() {
            document.getElementById('form-login').classList.add('hidden');
            document.getElementById('form-cadastro').classList.add('hidden');
            document.getElementById('botoes-iniciais').classList.remove('hidden');
        }

        // ================= UTILIDADES =================
        function formatarDataHora(dataString) {
            if (!dataString) return '';
            const data = new Date(dataString);
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const hora = String(data.getHours()).padStart(2, '0');
            const min = String(data.getMinutes()).padStart(2, '0');
            return `${dia}/${mes} às ${hora}:${min}`;
        }

        // ================= FUNÇÕES FINANCEIRAS =================
        function mostrarPix() { document.getElementById('modal-pix').classList.remove('hidden'); }
        function fecharPix() { document.getElementById('modal-pix').classList.add('hidden'); }
        function copiarPix() { navigator.clipboard.writeText("245561f2-8127-47b3-96cb-c819b94fd4e5").then(() => alert("Chave PIX copiada!")); }

        function calcularFichasDeposito() {
            let reais = parseFloat(document.getElementById('valor-deposito-reais').value) || 0;
            document.getElementById('fichas-a-receber').innerText = (reais * 100).toLocaleString('pt-BR');
        }

        function solicitarDeposito() {
            let reais = parseFloat(document.getElementById('valor-deposito-reais').value);
            if(!reais || reais <= 0) return alert("Digite um valor válido em Reais.");
            
            let fichas = reais * 100;
            
            db.collection('depositos').add({
                uid: auth.currentUser.uid, 
                nome: dadosUsuario.nome,
                reais: reais, 
                fichas: fichas, 
                status: 'pendente', 
                data: new Date().getTime()
            }).then(() => {
                alert("✅ Pedido enviado! O sistema vai liberar suas fichas assim que a banca confirmar o PIX.");
                fecharPix();
                document.getElementById('valor-deposito-reais').value = '';
                document.getElementById('fichas-a-receber').innerText = '0';
            }).catch(e => alert("Erro: " + e));
        }

        function pedirSaque() {
            const volume = dadosUsuario.totalApostado || 0;
            if (volume < 200) return alert(`⚠️ Saque Bloqueado!\nAposte no mínimo 200 fichas para liberar o saque. (Progresso: ${volume}/200)`);
            
            let valorFichas = parseInt(prompt(`Saldo: ${dadosUsuario.saldo} Fichas\n\nQuantas fichas você quer sacar?\nLembrete: 100 Fichas viram R$ 1,00 na sua conta.`));
            if (!valorFichas || valorFichas <= 0 || valorFichas > dadosUsuario.saldo) return alert("Valor inválido ou saldo insuficiente.");

            let chavePix = prompt("💸 Digite a sua Chave PIX para receber o pagamento:");
            if (!chavePix || chavePix.trim() === "") return alert("Saque cancelado. Você precisa informar uma Chave PIX para receber.");

            let reaisReceber = valorFichas / 100;

            db.runTransaction(async (transaction) => {
                const userRef = db.collection('usuarios').doc(auth.currentUser.uid);
                transaction.update(userRef, { saldo: dadosUsuario.saldo - valorFichas });
            }).then(() => {
                db.collection('saques').add({
                    uid: auth.currentUser.uid, 
                    nome: dadosUsuario.nome, 
                    fichas: valorFichas, 
                    reais: reaisReceber, 
                    chavePix: chavePix.trim(),
                    status: 'pendente', 
                    data: new Date().getTime()
                });
                alert(`✅ Saque solicitado com sucesso!\nA Banca enviará R$ ${reaisReceber.toFixed(2).replace('.',',')} para a chave:\n${chavePix}`);
            });
        }

        // ================= AUTENTICAÇÃO E PERFIL =================
        function editarNomeUsuario() {
            if(!dadosUsuario) return;
            const novoNome = prompt("✏️ Editar Perfil\n\nDigite como você quer ser chamado na plataforma:", dadosUsuario.nome);
            if(novoNome && novoNome.trim() !== "") {
                db.collection('usuarios').doc(auth.currentUser.uid).update({
                    nome: novoNome.trim()
                }).then(() => {
                    alert("✅ Nome atualizado com sucesso!");
                }).catch(e => alert("Erro ao atualizar: " + e.message));
            }
        }

        function criarConta() {
            const nome = document.getElementById('nome-cad').value.trim();
            const email = document.getElementById('email-cad').value.trim();
            const senha = document.getElementById('senha-cad').value.trim();
            if (!nome || !email || !senha) return alert("Preencha todos os campos para criar a conta.");
            
            auth.createUserWithEmailAndPassword(email, senha).then((cred) => {
                db.collection('usuarios').doc(cred.user.uid).set({ 
                    nome: nome, 
                    saldo: 0, 
                    totalApostado: 0 
                }).then(() => alert("Conta criada com sucesso! Aproveite."));
            }).catch(err => alert("Erro ao criar conta: " + err.message));
        }

        function fazerLogin() {
            const email = document.getElementById('email-login').value.trim();
            const senha = document.getElementById('senha-login').value.trim();
            if (!email || !senha) return alert("Preencha E-mail e Senha.");
            auth.signInWithEmailAndPassword(email, senha).catch(err => alert("Erro ao entrar. Verifique seus dados."));
        }

        // Se o cara já logou no celular antes, o Firebase chama isso automático e joga ele pra tela principal!
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('tela-principal').classList.remove('hidden');
                
                db.collection('usuarios').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        dadosUsuario = doc.data();
                        document.getElementById('nome-user').innerText = dadosUsuario.nome;
                        document.getElementById('saldo-user').innerText = dadosUsuario.saldo;
                    } else {
                        // O BANCO SUMIU? BLOQUEIA E DESLOGA O CARA NA HORA.
                        alert("⚠️ Erro de Cadastro: Sua conta não foi encontrada ou foi removida pelo Administrador.\n\nPor favor, entre em contato com o suporte.");
                        auth.signOut();
                        window.location.reload();
                    }
                });
                mudarFase('Oitavas');
            }
        });

        // ================= MOTOR AMM BLINDADO =================
        function calcularDados(p) {
            let realA = p.realA || 0;
            let realB = p.realB || 0;
            let volEsperado = p.volEsperado || 1; 
            let probA = p.probA || 50;
            let probB = 100 - probA;
            let riscoBase = p.risco || 0;

            let volReal = realA + realB;
            
            // Fator de Diluição
            let fator = Math.max(0, 1 - (volReal / volEsperado));

            // Fantasma Atualizado
            let phantomA = Math.max(1, Math.floor((volEsperado * 0.2) * (probA / 100) * fator));
            let phantomB = Math.max(1, Math.floor((volEsperado * 0.2) * (probB / 100) * fator));

            let poolA = realA + phantomA;
            let poolB = realB + phantomB;
            let totalPool = poolA + poolB;

            // Odds Exatas
            let oddA_str = Math.max(1.01, (totalPool / (poolA * OVERROUND))).toFixed(2);
            let oddB_str = Math.max(1.01, (totalPool / (poolB * OVERROUND))).toFixed(2);
            
            let oddA_num = parseFloat(oddA_str);
            let oddB_num = parseFloat(oddB_str);
            
            // Dívida Acumulada (Liability Real)
            let payoutA = p.payoutA || 0;
            let payoutB = p.payoutB || 0;
            
            let liabilityA = payoutA - volReal;
            let liabilityB = payoutB - volReal;

            // Risco Dinâmico
            let riscoDinamico = Math.floor(riscoBase * fator);

            // Fórmula Inquebrável de Limite
            let limA = Math.floor((riscoDinamico - liabilityA) / (oddA_num - 1));
            let limB = Math.floor((riscoDinamico - liabilityB) / (oddB_num - 1));

            if (!isFinite(limA) || limA < 0) limA = 0;
            if (!isFinite(limB) || limB < 0) limB = 0;

            return { oddA: oddA_str, oddB: oddB_str, limA: limA, limB: limB };
        }

        // ===================== RENDERIZAÇÃO =====================
        function mudarFase(f) {
            if(unsubscribeHistorico) unsubscribeHistorico();
            faseAtual = f; atualizarCoresMenu(f);
            const container = document.getElementById('container-principal');
            if(unsubscribePartidas) unsubscribePartidas();

            unsubscribePartidas = db.collection('partidas').where('fase', '==', faseAtual).onSnapshot(snapshot => {
                container.innerHTML = '';
                if (snapshot.empty) return container.innerHTML = '<p class="text-center text-gray-500 mt-10">Nenhuma partida programada.</p>';
                let ativas = 0;
                
                let partidasDoc = [];
                snapshot.forEach(doc => partidasDoc.push({id: doc.id, ...doc.data()}));
                partidasDoc.sort((a, b) => (a.dataJogo && b.dataJogo) ? new Date(a.dataJogo) - new Date(b.dataJogo) : -1);

                partidasDoc.forEach(p => {
                    const id = p.id;
                    if (p.status === 'preparacao') return; 
                    
                    ativas++;
                    const c = calcularDados(p);
                    let statusVisual = '';
                    let dataTag = p.dataJogo ? `<div class="text-center mb-2"><span class="bg-gray-900 text-gray-400 px-3 py-1 rounded-full text-[10px] font-bold border border-gray-700 tracking-wider uppercase">🗓️ ${formatarDataHora(p.dataJogo)}</span></div>` : '';
                    
                    if (p.status === 'finalizada') {
                        statusVisual = `<div class="mt-4 p-2 bg-gray-700 rounded text-center border border-gray-600"><span class="text-xs text-gray-400">Partida Encerrada</span><br><span class="font-bold text-yellow-400">Vencedor: ${p.vencedor === 'A' ? p.jogA : p.jogB} 🏆</span></div>`;
                    } else if (p.status === 'anulada') {
                        statusVisual = `<div class="mt-4 p-2 bg-red-900/30 rounded text-center border border-red-800"><span class="text-xs text-red-500 font-bold uppercase">⚠️ Partida Anulada</span><br><span class="text-[10px] text-gray-400">Apostas foram estornadas</span></div>`;
                    } else if (p.status === 'bloqueada') {
                        statusVisual = `<div class="mt-4 p-3 bg-yellow-900/30 rounded text-center border border-yellow-800"><span class="text-xs text-yellow-500 font-black uppercase">🔒 Apostas Encerradas</span><br><span class="text-[10px] text-gray-400">A partida começou e o mercado foi fechado.</span></div>`;
                    } else {
                        statusVisual = `<div class="flex gap-3 mt-4">
                            <button onclick="apostar('${id}', 'A', '${c.oddA}')" class="flex-1 bg-gray-700 hover:bg-green-700 p-2 rounded-lg border border-gray-600 shadow-sm transition"><span class="block text-green-400 font-black text-xl">${c.oddA}</span><span class="text-[9px] text-gray-400">Lim: ${c.limA} F.</span></button>
                            <button onclick="apostar('${id}', 'B', '${c.oddB}')" class="flex-1 bg-gray-700 hover:bg-green-700 p-2 rounded-lg border border-gray-600 shadow-sm transition"><span class="block text-green-400 font-black text-xl">${c.oddB}</span><span class="text-[9px] text-gray-400">Lim: ${c.limB} F.</span></button>
                           </div>`;
                    }
                    
                    container.innerHTML += `
                        <div class="bg-gray-800 rounded-xl p-4 mb-4 border border-gray-700 shadow-lg">
                            ${dataTag}
                            <div class="flex justify-between items-center bg-gray-900 p-3 rounded-lg border border-gray-700"><span class="font-bold text-sm w-5/12 text-center">${p.jogA}</span><span class="text-gray-600 text-[10px] font-black italic">VS</span><span class="font-bold text-sm w-5/12 text-center">${p.jogB}</span></div>
                            ${statusVisual}
                        </div>`;
                });
                if (ativas === 0) container.innerHTML = '<p class="text-center text-gray-500 mt-10">Partidas em preparação nos bastidores.</p>';
            });
        }

        function mostrarHistorico() {
            if(unsubscribePartidas) unsubscribePartidas();
            atualizarCoresMenu('Historico');
            const container = document.getElementById('container-principal');
            
            unsubscribeHistorico = db.collection('apostas').where('uid', '==', auth.currentUser.uid).onSnapshot(snapshot => {
                const vol = dadosUsuario.totalApostado || 0;
                let rollover = `<div class="mb-4 bg-gray-900 p-3 rounded-lg border border-gray-700 text-xs"><span class="text-gray-400">Progresso para Saque (Rollover):</span> <span class="font-bold text-green-400">${vol} / 200 Fichas</span></div>`;
                container.innerHTML = `<h2 class="text-lg font-bold text-blue-400 mb-2">Meu Histórico</h2>` + rollover;
                
                if(snapshot.empty) return container.innerHTML += '<p class="text-sm text-gray-500">Nenhuma aposta realizada.</p>';
                
                let apostas = [];
                snapshot.forEach(doc => apostas.push(doc.data()));
                apostas.sort((a, b) => b.data - a.data); 
                
                apostas.forEach(a => {
                    let cor = 'border-gray-600', ico = '⏳', txt = 'Aguardando jogo...';
                    
                    if(a.resultado === 'ganhou') { cor = 'border-green-500'; ico = '✅'; txt = `<span class="text-green-400 font-bold">+${a.premio} Fichas</span>`; } 
                    else if(a.resultado === 'perdeu') { cor = 'border-red-500'; ico = '❌'; txt = `<span class="text-red-400">Perdeu</span>`; }
                    else if(a.resultado === 'anulada') { cor = 'border-red-800'; ico = '⚠️'; txt = `<span class="text-red-400 font-bold uppercase">Estornada</span>`; }
                    
                    container.innerHTML += `
                        <div class="bg-gray-800 p-3 mb-3 rounded-lg border ${cor} flex flex-col gap-1 shadow-md">
                            <div class="flex justify-between items-center"><span class="text-xs text-gray-400">${a.jogA} x ${a.jogB}</span><span>${ico}</span></div>
                            <div class="text-sm">Apostou <span class="font-bold">${a.valor}</span> em <span class="text-yellow-400 font-bold">${a.escolhaNome}</span> (Odd: ${a.oddTravada})</div>
                            <div class="text-xs text-gray-400 mt-1">${txt}</div>
                        </div>`;
                });
            });
        }

        // ================= TRANSAÇÃO DE APOSTA BLINDADA =================
        function apostar(id, escolha, oddVista) {
            let valor = parseInt(prompt(`Odd: ${oddVista}\n\nQuantas fichas deseja apostar?`));
            if (!valor || valor <= 0) return;
            if (valor > dadosUsuario.saldo) return alert("❌ Saldo insuficiente!");

            const partidaRef = db.collection('partidas').doc(id);
            const userRef = db.collection('usuarios').doc(auth.currentUser.uid);

            db.runTransaction(async (transaction) => {
                const pDoc = await transaction.get(partidaRef);
                if (!pDoc.exists) throw new Error("Partida não encontrada.");
                
                const p = pDoc.data();
                if (p.status === 'bloqueada' || p.status === 'finalizada' || p.status === 'anulada') {
                    throw new Error("As apostas para esta partida estão encerradas.");
                }

                // Recalcula a matemática com Payout
                const c = calcularDados(p);
                const limReais = escolha === 'A' ? c.limA : c.limB;

                if (valor > limReais) {
                    throw new Error(`O limite máximo para esta odd no momento é de ${limReais} Fichas. \nO mercado está se protegendo, aguarde mais dinheiro entrar do outro lado.`);
                }

                let novoRealA = (p.realA || 0) + (escolha === 'A' ? valor : 0);
                let novoRealB = (p.realB || 0) + (escolha === 'B' ? valor : 0);
                
                let volRealNovo = novoRealA + novoRealB;
                let fatorNovo = Math.max(0, 1 - (volRealNovo / (p.volEsperado || 1)));

                let probA = p.probA || 50;
                let novoPhantomA = Math.max(1, Math.floor(((p.volEsperado || 0) * 0.2) * (probA / 100) * fatorNovo));
                let novoPhantomB = Math.max(1, Math.floor(((p.volEsperado || 0) * 0.2) * ((100 - probA) / 100) * fatorNovo));

                let novoPoolA = novoRealA + novoPhantomA;
                let novoPoolB = novoRealB + novoPhantomB;

                const oddFinal = escolha === 'A' ? c.oddA : c.oddB;
                const nomeEsc = escolha === 'A' ? p.jogA : p.jogB;

                // Calcula e salva o Payout Prometido (A Memória da Casa)
                let novoPayoutA = (p.payoutA || 0) + (escolha === 'A' ? Math.floor(valor * parseFloat(oddFinal)) : 0);
                let novoPayoutB = (p.payoutB || 0) + (escolha === 'B' ? Math.floor(valor * parseFloat(oddFinal)) : 0);

                transaction.update(userRef, { 
                    saldo: dadosUsuario.saldo - valor, 
                    totalApostado: firebase.firestore.FieldValue.increment(valor) 
                });

                transaction.update(partidaRef, { 
                    realA: novoRealA,
                    realB: novoRealB,
                    poolA: novoPoolA, 
                    poolB: novoPoolB,
                    payoutA: novoPayoutA, 
                    payoutB: novoPayoutB
                });

                const novaApostaRef = db.collection('apostas').doc();
                transaction.set(novaApostaRef, { 
                    uid: auth.currentUser.uid, 
                    partidaId: id, 
                    jogA: p.jogA, 
                    jogB: p.jogB, 
                    escolha: escolha, 
                    escolhaNome: nomeEsc, 
                    valor: valor, 
                    oddTravada: oddFinal, 
                    resultado: 'pendente', 
                    premio: 0, 
                    data: new Date().getTime() 
                });

            }).then(() => {
                alert("✅ Aposta Registrada com Sucesso!");
            }).catch(e => {
                alert("⚠️ Aposta Cancelada: \n" + e.message);
            });
        }

        function atualizarCoresMenu(ativo) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-green-600', 'bg-blue-600'); 
                btn.classList.add('bg-gray-700');
                if(btn.innerText === ativo) btn.classList.replace('bg-gray-700', 'bg-green-600');
                if(ativo === 'Historico' && btn.id === 'btn-historico') btn.classList.replace('bg-gray-700', 'bg-blue-600');
            });
        }
    </script>
